#version: "1.0"

services:
  traefik:
    image: traefik:v3.5.0 
    container_name: Traefik
    command: 
     - --api.insecure=true 
     - --providers.docker
     - --providers.file.filename=/etc/traefik/dynamic.yml
     - --providers.file.watch=true
     - traefik.enable=true
    ports:
     - "80:80"
     - "443:443"
     - "9090:8080"
    volumes:
     - /var/run/docker.sock:/var/run/docker.sock
     - ./traefikConfig/traefik.yaml:/etc/traefik/traefik.yaml:ro
     - ./traefikConfig/traefik_dynamic.yml:/etc/traefik/dynamic.yml:ro #wait until DB
     - ./certs:/certs
    restart: unless-stopped
    depends_on:
     - api
     - frontend
    networks:
      - proxy
  mysql:
    container_name: mysql
    build: 
      context: ./MySQL 
      dockerfile: mysql.dockerfile
    restart: unless-stopped
    env_file:
     - .envdb
    networks:
      - backend
    volumes:
      - BackendData:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysql -u$$MYSQL_USER -p$$MYSQL_PASSWORD -h localhost -e 'SELECT 1;'"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
  api:
    build:
      context: ./FlaskBackend
      dockerfile: flask.dockerfile
    container_name: api
    restart: unless-stopped
    env_file:
     - .envapi
    ports:
     - "5000:5000"
    networks:
     proxy:
      aliases:
        - api.proxy.local
     backend: {}
    labels:
     - traefik.enable=true
     - traefik.http.routers.api-router.rule=Host(`localhost`) && PathPrefix(`/api`)
     ## HTTP router for redirect
     - traefik.http.routers.api-router-http.rule=Host(`localhost`)
     - traefik.http.routers.api-router-http.entrypoints=web
     - traefik.http.routers.api-router-http.middlewares=redirect-to-https
     - traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https
     - traefik.http.routers.api-router-http.priority=100
     ## TLS and priority
     - traefik.http.routers.api-router.entrypoints=websecure,web
     - "traefik.http.routers.api-router.tls=true"
     - "traefik.http.routers.api-router.tls.certresolver=selfsigned"
     ## priority
     - traefik.http.routers.api-router.priority=3
     - traefik.http.routers.api-router.service=api
     - traefik.http.services.api.loadbalancer.server.url=http://api.proxy.local:5000
     ## Middleware exclusion
     - "traefik.http.routers.auth-router.rule=Host(`api.proxy.local`) && PathPrefix(`/api/auth`)"
     - "traefik.http.routers.auth-router.entrypoints=websecure"
     - "traefik.http.routers.auth-router.tls=true"
     - "traefik.http.routers.auth-router.service=api"
     - traefik.http.routers.auth-router.priority=4
     ## Middleware
     - "traefik.http.middlewares.test-auth.forwardauth.address=https://api.proxy.local:5000/api/auth/verify"
     - "traefik.http.middlewares.test-auth.forwardauth.trustforwardheader=true"
     - "traefik.http.middlewares.need-auth.errors.status=401-401"
     - "traefik.http.middlewares.need-auth.errors.service=frontend-router"
     - "traefik.http.middlewares.need-auth.errors.query=/"
     #- traefik.http.routers.api-router.middlewares=test-auth
     - traefik.docker.network=proxy
    depends_on:
      mysql:
       condition: service_healthy
  frontend:
    build: 
      context: ./Frontend
      dockerfile: frontend.dockerfile
    container_name: frontend
    networks:
      proxy:
        aliases:
        - frontend.proxy.local
    labels:
      - traefik.enable=true
      - traefik.http.routers.frontend-router.rule=Host(`localhost`)
      #HTTP router to redirect
      - traefik.http.routers.frontend-router-http.rule=Host(`localhost`)
      - traefik.http.routers.frontend-router-http.entrypoints=web
      - traefik.http.routers.frontend-router-http.middlewares=redirect-to-https2
      - traefik.http.middlewares.redirect-to-https2.redirectscheme.scheme=https
      - traefik.http.routers.frontend-router-http.priority=2 
      #TLS
      - traefik.http.routers.frontend-router.entrypoints=websecure,web
      - "traefik.http.routers.frontend-router.tls=true"
      - "traefik.http.routers.frontend-router.tls.certresolver=selfsigned"
      #Priority
      - traefik.http.routers.frontend-router.priority=1
      - traefik.http.services.frontend-router.loadbalancer.server.url=http://frontend.proxy.local:80
      #- traefik.http.routers.frontend-router.middlewares=test-auth
      - traefik.docker.network=proxy
    depends_on:
      - api
    



networks:
  backend:
    driver: bridge
  proxy:
    driver: bridge
volumes:
  BackendData: